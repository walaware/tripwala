# tripwala — single self-hosted stack.
#
#   docker compose up --build
#
# Then open http://localhost:8080 (Caddy) → SvelteKit, with PocketBase proxied
# at /api and /_ . PocketBase admin UI: http://localhost:8080/_/
#
# Reverse-proxy friendly: in production put your own TLS proxy in front, or edit
# the Caddyfile. The web and pocketbase services are not published directly.

name: tripwala

services:
  pocketbase:
    build:
      context: ./pocketbase
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    environment:
      # The SvelteKit server authenticates as this superuser to operate while
      # collection rules are locked. In prod these come from 1Password
      # (op:// in .env, run via `op run -- docker compose up -d`).
      - "PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@tripwala.local}"
      - "PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:-tripwalaadmin123}"
      # Google OAuth2 sign-in. The auth migration reads these to configure the
      # provider; empty = Google sign-in disabled (email/password still works).
      - "GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}"
      - "GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
    # Idempotently ensure the superuser exists, then serve. Makes `up` one-step.
    entrypoint:
      - /bin/sh
      - -c
      - '/pb/pocketbase superuser upsert "$$PB_SUPERUSER_EMAIL" "$$PB_SUPERUSER_PASSWORD" || true; exec /pb/pocketbase serve --http=0.0.0.0:8090'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8090/api/health']
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      # Server-side PocketBase URL (container network).
      - PB_URL=http://pocketbase:8090
      # Public origin — adapter-node uses this to build absolute URLs (incl. the
      # Google OAuth redirect_uri) and for CSRF. Must match how you reach the
      # stack; default is the published Caddy port. Override for other setups.
      - "ORIGIN=${ORIGIN:-http://localhost:8080}"
      # Same superuser the SvelteKit server authenticates with.
      - "PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@tripwala.local}"
      - "PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:-tripwalaadmin123}"
    depends_on:
      pocketbase:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - web
      - pocketbase

volumes:
  pb_data:
  caddy_data:
