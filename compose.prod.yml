# tripwala — production stack (pulls prebuilt images from GHCR; no local build).
#
#   op run -- docker compose -f compose.prod.yml pull
#   op run -- docker compose -f compose.prod.yml up -d
#
# Put a tunnel/reverse proxy in front of the published Caddy port — e.g. a
# Cloudflare Tunnel routing tripwala.<your-domain> → http://<host>:8080 (manage
# the tunnel config wherever you keep your infra). Set IMAGE_OWNER/IMAGE_TAG +
# PB_SUPERUSER_* in .env (op:// URIs in prod).

name: tripwala

services:
  pocketbase:
    image: ghcr.io/${IMAGE_OWNER:-walaware}/tripwala-pocketbase:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    environment:
      - "PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:?set in .env}"
      - "PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:?set in .env}"
      # Google OAuth2 sign-in (op:// URIs in prod). Empty = Google disabled.
      - "GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}"
      - "GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
    entrypoint:
      - /bin/sh
      - -c
      - '/pb/pocketbase superuser upsert "$$PB_SUPERUSER_EMAIL" "$$PB_SUPERUSER_PASSWORD" || true; exec /pb/pocketbase serve --http=0.0.0.0:8090'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8090/api/health']
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: ghcr.io/${IMAGE_OWNER:-walaware}/tripwala-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - PB_URL=http://pocketbase:8090
      - "PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:?set in .env}"
      - "PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:?set in .env}"
      # REQUIRED behind a tunnel/proxy: adapter-node rejects form POSTs whose
      # Origin doesn't match, and the invite links it mails are built from this.
      - "ORIGIN=${ORIGIN:?set in .env, e.g. https://tripwala.example.com}"
      # Raise adapter-node's 512K default so 5 MB photo/avatar uploads don't get
      # their request body torn down mid-stream (uploads otherwise hang). See compose.yml.
      - "BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-8M}"
      # Optional SMTP relay for invite-by-email (empty = feature disabled). See
      # .env.example; SMTP_FROM must be on a domain verified with the provider.
      - "SMTP_HOST=${SMTP_HOST:-}"
      - "SMTP_PORT=${SMTP_PORT:-587}"
      - "SMTP_USER=${SMTP_USER:-}"
      - "SMTP_PASS=${SMTP_PASS:-}"
      - "SMTP_FROM=${SMTP_FROM:-}"
      # Optional Immich integration for shared trip albums.
      - "IMMICH_URL=${IMMICH_URL:-}"
      - "IMMICH_API_KEY=${IMMICH_API_KEY:-}"
    depends_on:
      pocketbase:
        condition: service_healthy

  # No Caddyfile mount: the config is baked into the image, so the deployment's
  # public surface is versioned and cannot drift from the repo. Upstreams come
  # from env — these defaults match the service names above, so they're only
  # needed where containers are named differently (PB_UPSTREAM/WEB_UPSTREAM).
  caddy:
    image: ghcr.io/${IMAGE_OWNER:-walaware}/tripwala-caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:80" # front this with your Cloudflare Tunnel / reverse proxy
      # API Access — curated /api/x/* surface, bound to loopback only. The host
      # fronts it with Tailscale (tailnet-only), never the public internet:
      #   tailscale serve --bg --https 443 http://127.0.0.1:8091
      # See caddy/Caddyfile (the :8091 site) and docs/for-api.md.
      - "127.0.0.1:8091:8091"
    volumes:
      - caddy_data:/data
    depends_on:
      - web
      - pocketbase

volumes:
  pb_data:
  caddy_data:
