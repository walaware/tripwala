name: Build & publish images

# Builds the web and pocketbase images and pushes them to GitHub Container
# Registry (GHCR) so the homelab can `docker compose pull` instead of building.
# Tags: `latest` on the default branch, the short SHA always, and the version on
# git tags like `v1.2.3`.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tripwala-web
            context: ./web
          - image: tripwala-pocketbase
            context: ./pocketbase
          # The edge proxy ships its Caddyfile baked in, so the deployment's
          # public surface is versioned with the code rather than hand-copied.
          - image: tripwala-caddy
            context: ./caddy
    steps:
      - uses: actions/checkout@v4

      # Provides a builder with the docker-container driver, required for the
      # gha cache backend below (the default docker driver can't export cache).
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
